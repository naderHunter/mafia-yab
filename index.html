<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mafia Target Tracker Pro</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f111a" />
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مافیایاب">
<link rel="apple-touch-icon" href="icon-192.png">

  <style>
    @font-face{
      font-family:Dana;
      src:url('dana-regular.ttf') format('truetype');
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#0f111a;
      --bg2:#171a2b;
      --card:rgba(26,29,46,.82);
      --card2:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.09);
      --text:#f4f6ff;
      --muted:#a6accd;
      --primary:#4361ee;
      --primary2:#4cc9f0;
      --danger:#e63946;
      --warning:#f4a261;
      --success:#2a9d8f;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%}
    body{
      margin:0;
      padding:16px;
      color:var(--text);
      font-family:Dana,Tahoma,Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(67,97,238,.28), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(230,57,70,.20), transparent 26%),
        linear-gradient(145deg,#090a10 0%, var(--bg) 48%, #111426 100%);
      line-height:1.75;
    }

    .app{width:100%;max-width:560px;margin:0 auto 34px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 16px}
    .brand{display:flex;flex-direction:column;gap:2px}
    .brand h1{font-size:21px;line-height:1.2;margin:0;font-weight:800;letter-spacing:-.3px}
    .brand span{font-size:12px;color:var(--muted)}
    .pill{font-size:12px;color:#fff;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:999px;padding:7px 10px;white-space:nowrap}

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      padding:18px;
      margin-bottom:14px;
      overflow:hidden;
    }

    h2,h3{margin:0 0 14px;text-align:right;letter-spacing:-.3px}
    h2{font-size:20px} h3{font-size:17px}
    p{margin:8px 0;color:var(--muted);font-size:13px}

    .grid{display:grid;gap:12px}
    .two{grid-template-columns:1fr 1fr}

    label.caption{display:block;color:var(--muted);font-size:13px;margin:0 0 7px}
    input,textarea,select{
      width:100%;
      border:1px solid var(--border);
      outline:none;
      background:rgba(5,7,13,.74);
      color:var(--text);
      border-radius:14px;
      padding:13px 14px;
      font:inherit;
      transition:.18s border-color,.18s box-shadow,.18s background;
    }
    textarea{resize:vertical;min-height:92px}
    input:focus,textarea:focus,select:focus{border-color:rgba(76,201,240,.55);box-shadow:0 0 0 4px rgba(76,201,240,.08);background:rgba(5,7,13,.92)}

    button{
      width:100%;
      border:0;
      border-radius:14px;
      padding:13px 14px;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),#5f41e8);
      font:inherit;
      font-weight:800;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.18s transform,.18s filter,.18s background,.18s opacity;
    }
    button:active{transform:scale(.985)}
    button:disabled{opacity:.48;cursor:not-allowed}
    .btn-muted{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text)}
    .btn-danger{background:linear-gradient(135deg,var(--danger),#b5172a)}
    .btn-success{background:linear-gradient(135deg,var(--success),#178577)}
    .btn-warning{background:linear-gradient(135deg,var(--warning),#e76f51)}
    .btn-mini{width:auto;padding:8px 10px;font-size:12px;border-radius:11px;font-weight:800;white-space:nowrap}

    .days{display:flex;gap:7px;overflow:auto;padding:2px 0 12px;margin-bottom:12px;scrollbar-width:none}
    .days::-webkit-scrollbar{display:none}
    .day{flex:0 0 auto;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.065);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer}
    .day.active{background:linear-gradient(135deg,var(--danger),#f72585);color:#fff;font-weight:800;border-color:rgba(255,255,255,.18)}

    .player-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:10px}
    .player-title{display:flex;align-items:center;gap:9px;min-width:0}
    .num{width:28px;height:28px;border-radius:10px;background:rgba(67,97,238,.20);display:flex;align-items:center;justify-content:center;color:#b9c4ff;font-size:12px;font-weight:800;flex:0 0 auto}
    .name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{color:var(--muted);font-size:11px;margin-top:2px}
    .actions{display:flex;gap:7px;align-items:center}
    .dead{opacity:.48}.dead .name{text-decoration:line-through}

    .target-list{background:rgba(5,7,13,.45);border:1px solid var(--border);border-radius:16px;overflow:hidden;max-height:330px;overflow-y:auto;margin:12px 0}
    .target-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.055);cursor:pointer;user-select:none}
    .target-item:last-child{border-bottom:0}
    .target-name{font-weight:700;text-align:right;flex:1}
    .target-note{font-size:11px;color:var(--muted)}
    .target-checkbox{appearance:none;width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.05);display:grid;place-items:center;flex:0 0 auto}
    .target-checkbox:checked{background:var(--danger);border-color:var(--danger)}
    .target-checkbox:checked:after{content:'✓';font-weight:900;color:white;font-size:15px;line-height:1}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0}
    .stat-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:12px;text-align:center}
    .stat-box b{display:block;font-size:19px}.stat-box span{color:var(--muted);font-size:11px}

    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:14px;font-size:12px}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center}
    th{color:var(--muted);font-weight:700;background:rgba(255,255,255,.04)}
    td:first-child,th:first-child{text-align:right}
    .score{display:inline-flex;min-width:48px;justify-content:center;border-radius:999px;padding:3px 8px;background:rgba(76,201,240,.13);color:#70ddff;font-weight:900}
    .score.hot{background:rgba(230,57,70,.16);color:#ff7b86}

    .canvas-wrap{background:rgba(5,7,13,.55);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin:12px 0}
    canvas{width:100%;display:block}

    .note-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px;margin:8px 0}
    .note-card strong{display:block;margin-bottom:4px}.note-card small{color:var(--muted)}

    .footer-actions{display:grid;gap:9px;margin-top:12px}
    .empty{color:var(--muted);text-align:center;padding:18px;font-size:13px}
  </style>
</head>
<body>
  <main id="app" class="app"></main>

<script>
const STORAGE_KEY = 'mafiaTrackerPro_rewrite_v1';

const DEFAULT_STATE = () => ({
  players: [],
  days: ['معارفه','روز 1','روز 2','روز 3','روز 4','روز 5'],
  currentDay: 'معارفه',
  data: {},
  createdAt: new Date().toISOString()
});

let state = DEFAULT_STATE();

function $(id){ return document.getElementById(id); }
function esc(str){
  return String(str ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch]));
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('mafiaTracker');
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state = normalizeState(parsed);
      save();
      renderMain();
      return;
    }catch(e){ console.warn(e); }
  }
  renderSetup();
}
function normalizeState(s){
  const n = DEFAULT_STATE();
  n.players = Array.isArray(s.players) ? s.players.map((p,i)=> typeof p === 'string' ? {name:p||`بازیکن ${i+1}`,dead:false} : {name:p.name||`بازیکن ${i+1}`,dead:!!p.dead}) : [];
  n.days = Array.isArray(s.days) && s.days.length ? s.days : n.days;
  n.currentDay = s.currentDay || n.days[0];
  n.data = s.data && typeof s.data === 'object' ? s.data : {};
  n.createdAt = s.createdAt || new Date().toISOString();
  n.days.forEach(d => { if(!n.data[d]) n.data[d] = {}; });
  if(!n.days.includes(n.currentDay)) n.currentDay = n.days[0];
  return n;
}
function ensureDay(day=state.currentDay){ if(!state.data[day]) state.data[day] = {}; }

function shell(content){
  return `
    <div class="topbar">
      <div class="brand"><h1>مافیا ترکر پرو</h1><span>ردیابی تارگت، فشار و شبکه ارتباطی</span></div>
      <div class="pill">${state.players.length ? state.players.length + ' بازیکن' : 'PWA'}</div>
    </div>
    ${content}
  `;
}

function renderSetup(){
  $('app').innerHTML = shell(`
    <section class="card">
      <h2>شروع بازی جدید</h2>
      <p>تعداد بازیکنان را مشخص کن. داده‌ها روی همین دستگاه و به‌صورت آفلاین ذخیره می‌شوند.</p>
      <label class="caption" for="count">تعداد بازیکنان</label>
      <input id="count" type="number" min="8" max="20" value="10" inputmode="numeric">
      <div class="footer-actions">
        <button onclick="createPlayers()">ساخت فرم اسامی</button>
      </div>
    </section>
  `);
}

function createPlayers(){
  const c = parseInt($('count').value,10);
  if(!Number.isFinite(c) || c < 8 || c > 20){ alert('تعداد بازیکنان باید بین ۸ تا ۲۰ باشد.'); return; }
  let inputs = '';
  for(let i=0;i<c;i++) inputs += `<label class="caption">بازیکن ${i+1}</label><input id="p${i}" placeholder="نام بازیکن ${i+1}" autocomplete="off">`;
  $('app').innerHTML = shell(`
    <section class="card">
      <h2>ورود اسامی بازیکنان</h2>
      <div class="grid">${inputs}</div>
      <div class="footer-actions">
        <button onclick="startGame(${c})">شروع بازی</button>
        <button class="btn-muted" onclick="renderSetup()">بازگشت</button>
      </div>
    </section>
  `);
}

function startGame(c){
  state = DEFAULT_STATE();
  state.players = Array.from({length:c}, (_,i)=>({ name: ($('p'+i).value || `بازیکن ${i+1}`).trim(), dead:false }));
  state.days.forEach(d => state.data[d] = {});
  save(); renderMain();
}

function renderMain(){
  ensureDay();
  let days = state.days.map(d=>`<div class="day ${d===state.currentDay?'active':''}" onclick="changeDay('${esc(d)}')">${esc(d)}</div>`).join('');
  let rows = state.players.map((p,i)=>{
    const rec = state.data[state.currentDay]?.[i];
    const count = rec?.targets?.length || 0;
    const label = count ? `ویرایش (${count})` : 'ثبت تارگت';
    return `<div class="player-row ${p.dead?'dead':''}">
      <div class="player-title">
        <span class="num">${i+1}</span>
        <div><div class="name">${esc(p.name)}</div><div class="sub">${p.dead?'خارج از بازی':'فعال'}${count ? ' · ' + count + ' تارگت در این روز' : ''}</div></div>
      </div>
      <div class="actions">
        <button class="btn-mini btn-muted" onclick="openPlayer(${i})" ${p.dead?'disabled':''}>${label}</button>
        <button class="btn-mini ${p.dead?'btn-success':'btn-danger'}" onclick="toggleDead(${i})">${p.dead?'احیا':'حذف'}</button>
      </div>
    </div>`;
  }).join('');

  $('app').innerHTML = shell(`
    <section class="card">
      <h2>داشبورد بازی</h2>
      <div class="days">${days}</div>
      ${rows}
      <div class="footer-actions">
        <button class="btn-success" onclick="renderAnalysis()">تحلیل و گراف شبکه</button>
        <button class="btn-muted" onclick="addDay()">افزودن روز جدید</button>
        <button class="btn-danger" onclick="resetApp()">ریست کامل بازی</button>
      </div>
    </section>
  `);
}

function changeDay(day){ state.currentDay = day; ensureDay(); save(); renderMain(); }
function addDay(){
  const n = state.days.length;
  const name = prompt('نام روز جدید:', `روز ${n}`);
  if(!name) return;
  if(!state.days.includes(name)) state.days.push(name);
  state.currentDay = name; ensureDay(); save(); renderMain();
}
function toggleDead(i){ state.players[i].dead = !state.players[i].dead; save(); renderMain(); }

function openPlayer(i){
  ensureDay();
  const player = state.players[i];
  const rec = state.data[state.currentDay]?.[i] || {targets:[], note:''};
  let items = state.players.map((p,idx)=>{
    if(idx===i || p.dead) return '';
    const checked = rec.targets.includes(idx) ? 'checked' : '';
    return `<label class="target-item" for="t${idx}">
      <div><div class="target-name">${idx+1}. ${esc(p.name)}</div><div class="target-note">انتخاب به عنوان تارگت</div></div>
      <input id="t${idx}" class="target-checkbox" type="checkbox" value="${idx}" ${checked}>
    </label>`;
  }).join('');
  if(!items.trim()) items = `<div class="empty">بازیکن زنده دیگری برای انتخاب وجود ندارد.</div>`;

  $('app').innerHTML = shell(`
    <section class="card">
      <h2>ثبت تارگت</h2>
      <p><b>${esc(player.name)}</b> در <b>${esc(state.currentDay)}</b></p>
      <div class="target-list">${items}</div>
      <label class="caption" for="note">یادداشت تحلیلی</label>
      <textarea id="note" placeholder="مثلا: دفاع عجیب، تارگت متقابل، فشار جمعی...">${esc(rec.note || '')}</textarea>
      <div class="footer-actions">
        <button onclick="saveTargets(${i})">ذخیره</button>
        <button class="btn-muted" onclick="renderMain()">بازگشت</button>
      </div>
    </section>
  `);
}

function saveTargets(i){
  ensureDay();
  const targets = Array.from(document.querySelectorAll('.target-checkbox:checked')).map(x=>parseInt(x.value,10));
  state.data[state.currentDay][i] = { targets, note: $('note').value.trim() };
  save(); renderMain();
}

function computeStats(){
  const given = Array(state.players.length).fill(0);
  const received = Array(state.players.length).fill(0);
  const focusDays = Array.from({length:state.players.length},()=>new Set());
  state.days.forEach(day=>{
    const dd = state.data[day] || {};
    Object.keys(dd).forEach(giver=>{
      const g = parseInt(giver,10);
      const targets = dd[g]?.targets || [];
      given[g] += targets.length;
      targets.forEach(t=>{ received[t]++; focusDays[t].add(day); });
    });
  });
  return state.players.map((p,i)=>{
    const score = (0.35*given[i]) - (0.25*received[i]);
    return {i,p,given:given[i],received:received[i],focus:focusDays[i].size,score};
  });
}

function renderAnalysis(){
  const stats = computeStats();
  const totalEdges = stats.reduce((s,x)=>s+x.given,0);
  const hot = [...stats].sort((a,b)=>b.score-a.score)[0];
  const pressured = [...stats].sort((a,b)=>b.received-a.received)[0];
  const rows = stats.map(x=>`<tr>
    <td>${x.i+1}. ${esc(x.p.name)}</td><td>${x.given}</td><td>${x.received}</td><td>${x.focus}</td><td><span class="score ${x.score>0?'hot':''}">${x.score.toFixed(2)}</span></td>
  </tr>`).join('');
  const notes = collectNotes();
  $('app').innerHTML = shell(`
    <section class="card">
      <h2>تحلیل بازی</h2>
      <div class="stats">
        <div class="stat-box"><b>${totalEdges}</b><span>کل تارگت‌ها</span></div>
        <div class="stat-box"><b>${hot ? esc(hot.p.name) : '-'}</b><span>تهاجمی‌ترین</span></div>
        <div class="stat-box"><b>${pressured ? esc(pressured.p.name) : '-'}</b><span>زیر فشار</span></div>
      </div>
      <table><thead><tr><th>بازیکن</th><th>داده</th><th>گرفته</th><th>روز فشار</th><th>امتیاز</th></tr></thead><tbody>${rows}</tbody></table>
      <h3 style="margin-top:18px">گراف شبکه روز فعلی</h3>
      <p>خطوط قرمز نشان می‌دهد هر بازیکن در روز انتخاب‌شده چه کسانی را تارگت کرده است.</p>
      <div class="canvas-wrap"><canvas id="graph"></canvas></div>
      <h3 style="margin-top:18px">یادداشت‌ها</h3>
      ${notes || '<div class="empty">هنوز یادداشتی ثبت نشده است.</div>'}
      <div class="footer-actions">
        <button class="btn-success" onclick="downloadJSON()">دانلود JSON بازی</button>
        <button class="btn-muted" onclick="renderMain()">بازگشت</button>
      </div>
    </section>
  `);
  setTimeout(drawGraph,60);
}

function collectNotes(){
  let out = '';
  state.days.forEach(day=>{
    const dd = state.data[day] || {};
    Object.keys(dd).forEach(k=>{
      const note = dd[k]?.note;
      if(note) out += `<div class="note-card"><strong>${esc(state.players[k]?.name || 'بازیکن')} · ${esc(day)}</strong><small>${esc(note)}</small></div>`;
    });
  });
  return out;
}

function drawGraph(){
  const canvas = $('graph'); if(!canvas) return;
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(320, wrap.clientWidth);
  const h = Math.min(430, Math.max(330, w));
  canvas.width = w*dpr; canvas.height = h*dpr; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2, r=Math.min(w,h)/2-48;
  const pts = state.players.map((p,i)=>{ const a=(i/state.players.length)*Math.PI*2-Math.PI/2; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a), a}; });
  const dd = state.data[state.currentDay] || {};

  Object.keys(dd).forEach(g=>{
    const gi=parseInt(g,10); const targets=dd[g]?.targets || [];
    targets.forEach(t=>{
      const from=pts[gi], to=pts[t]; if(!from||!to) return;
      const mx=(from.x+to.x)/2, my=(from.y+to.y)/2;
      const dx=to.x-from.x, dy=to.y-from.y, len=Math.hypot(dx,dy)||1;
      const off=18;
      const qx=mx + (-dy/len)*off, qy=my + (dx/len)*off;
      ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.quadraticCurveTo(qx,qy,to.x,to.y);
      ctx.strokeStyle = (state.players[gi].dead || state.players[t].dead) ? 'rgba(255,255,255,.10)' : 'rgba(230,57,70,.58)';
      ctx.lineWidth=1.7; ctx.stroke();
      const ang=Math.atan2(to.y-qy,to.x-qx);
      ctx.beginPath(); ctx.moveTo(to.x,to.y);
      ctx.lineTo(to.x-8*Math.cos(ang-Math.PI/6), to.y-8*Math.sin(ang-Math.PI/6));
      ctx.lineTo(to.x-8*Math.cos(ang+Math.PI/6), to.y-8*Math.sin(ang+Math.PI/6));
      ctx.closePath(); ctx.fillStyle=ctx.strokeStyle; ctx.fill();
    });
  });

  pts.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fillStyle = state.players[i].dead ? '#343a55' : '#4361ee'; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='#101320'; ctx.stroke();
    ctx.fillStyle = state.players[i].dead ? 'rgba(255,255,255,.42)' : '#fff';
    ctx.font='11px Dana, Tahoma';
    ctx.textAlign = Math.cos(p.a)>0.2 ? 'left' : Math.cos(p.a)<-0.2 ? 'right' : 'center';
    ctx.textBaseline='middle';
    ctx.fillText(state.players[i].name, p.x + 18*Math.cos(p.a), p.y + 18*Math.sin(p.a));
  });
}

function downloadJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mafia-game-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

function resetApp(){
  if(confirm('همه اطلاعات بازی پاک شود؟')){ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem('mafiaTracker'); state=DEFAULT_STATE(); renderSetup(); }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
load();
</script>
