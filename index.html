<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مافیایاب</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="مافیایاب">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    @font-face {
      font-family: 'Dana';
      src: url('./dana-regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Dana', 'Vazirmatn', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 15px;
      direction: rtl;
      text-align: right;
      -webkit-tap-highlight-color: transparent;
    }

    h1, h2, h3 {
      color: #e63946;
      margin-top: 0;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid #2a2a2a;
    }

    button {
      font-family: 'Dana', 'Vazirmatn', sans-serif;
      padding: 12px;
      margin: 8px 0;
      width: 100%;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:active {
      background: #c32f3a;
    }

    button.secondary {
      background: #333;
      border: 1px solid #444;
    }

    button.secondary:active {
      background: #444;
    }

    input, textarea, select {
      font-family: 'Dana', 'Vazirmatn', sans-serif;
      width: 100%;
      padding: 12px;
      margin: 8px 0 12px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 15px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .player-row.dead {
      opacity: 0.55;
      text-decoration: line-through;
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
    }

    .player-meta {
      font-size: 13px;
      color: #bdbdbd;
    }

    .days-container {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      scrollbar-width: thin;
    }

    .day-tab {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: #2d2d2d;
      color: #ddd;
      border: 1px solid #444;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
    }

    .day-tab.active {
      background: #e63946;
      border-color: #e63946;
      color: #fff;
    }

    .target-checkbox-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .target-checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #292929;
      border: 1px solid #3c3c3c;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      color: #fff;
    }

    .target-checkbox-label input {
      width: auto;
      margin: 0;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #444;
      color: #ddd;
    }

    .section-note {
      color: #bdbdbd;
      font-size: 14px;
      line-height: 1.8;
    }

    #network-svg {
      width: 100%;
      height: 420px;
      background: #181818;
      border: 1px solid #333;
      border-radius: 12px;
      margin-top: 14px;
    }

    .node {
      fill: #e63946;
      stroke: #ffffff;
      stroke-width: 2;
    }

    .dead-node {
      fill: #666;
    }

    .link {
      stroke: #999;
      stroke-width: 2;
      marker-end: url(#arrowhead);
    }

    .node-text {
      font-family: 'Dana', 'Vazirmatn', sans-serif;
      fill: #ffffff;
      font-size: 12px;
      text-anchor: middle;
    }

    #stats-panel {
      margin-top: 14px;
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      line-height: 1.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>مافیایاب</h1>
    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById('app');

    let state = {
      players: [],
      days: ["معارفه", "روز 1", "روز 2", "روز 3", "روز 4", "روز 5"],
      currentDay: "معارفه",
      data: {}
    };

    function loadState() {
      const saved = localStorage.getItem('mafiaTrackerState');
      if (saved) {
        try {
          state = JSON.parse(saved);
        } catch (error) {
          console.error('State parse error:', error);
        }
      }
    }

    function saveState() {
      localStorage.setItem('mafiaTrackerState', JSON.stringify(state));
    }

    function renderSetup() {
      app.innerHTML = `
        <h2>تنظیم بازی جدید</h2>
        <label for="player-count">تعداد بازیکنان</label>
        <input id="player-count" type="number" min="4" max="20" value="10">
        <button onclick="initPlayers()">شروع بازی</button>
      `;
    }

    function initPlayers() {
      const count = parseInt(document.getElementById('player-count').value, 10);
      if (!count || count < 4 || count > 20) {
        alert('تعداد بازیکنان باید بین 4 تا 20 باشد.');
        return;
      }

      state.players = Array.from({ length: count }, (_, index) => ({
        name: `بازیکن ${index + 1}`,
        isDead: false
      }));
      state.data = {};
      state.currentDay = "معارفه";
      saveState();
      renderPlayerNaming();
    }

    function renderPlayerNaming() {
      app.innerHTML = `
        <h2>نام‌گذاری بازیکنان</h2>
        ${state.players.map((player, index) => `
          <label for="p-name-${index}">نام بازیکن ${index + 1}</label>
          <input id="p-name-${index}" type="text" value="${player.name}">
        `).join('')}
        <button onclick="savePlayerNames()">تایید و ورود به بازی</button>
      `;
    }

    function savePlayerNames() {
      state.players = state.players.map((player, index) => {
        const value = document.getElementById(`p-name-${index}`).value.trim();
        return {
          ...player,
          name: value || `بازیکن ${index + 1}`
        };
      });
      saveState();
      renderMain();
    }

    function renderMain() {
      const dayTabs = state.days.map(day => `
        <button class="day-tab ${state.currentDay === day ? 'active' : ''}" onclick="selectDay('${day}')">${day}</button>
      `).join('');

      const playerRows = state.players.map((player, index) => {
        const dayData = state.data[state.currentDay]?.[index];
        const targetNames = dayData?.targets?.map(targetIndex => state.players[targetIndex]?.name).filter(Boolean).join('، ') || 'ثبت نشده';

        return `
          <div class="player-row ${player.isDead ? 'dead' : ''}" onclick="editTargets(${index})">
            <div class="player-info">
              <div class="player-name">${player.name}</div>
              <div class="player-meta">
                ${player.isDead ? 'حذف شده' : 'فعال'} | تارگت امروز: ${targetNames}
              </div>
            </div>
            <button class="secondary" onclick="event.stopPropagation(); toggleStatus(${index})">
              ${player.isDead ? 'احیا' : 'حذف'}
            </button>
          </div>
        `;
      }).join('');

      app.innerHTML = `
        <div class="days-container">${dayTabs}</div>
        ${playerRows}
        <button onclick="renderAnalysis()">نمایش گراف ارتباطات و تحلیل</button>
        <button class="secondary" onclick="exportData()">خروجی به صورت فایل JSON</button>
        <button class="secondary" onclick="resetApp()">ریست کل بازی</button>
      `;
    }

    function selectDay(day) {
      state.currentDay = day;
      saveState();
      renderMain();
    }

    function toggleStatus(index) {
      state.players[index].isDead = !state.players[index].isDead;
      saveState();
      renderMain();
    }

    function editTargets(playerIndex) {
      if (!state.data[state.currentDay]) {
        state.data[state.currentDay] = {};
      }

      if (!state.data[state.currentDay][playerIndex]) {
        state.data[state.currentDay][playerIndex] = {
          targets: [],
          note: ''
        };
      }

      const player = state.players[playerIndex];
      const currentData = state.data[state.currentDay][playerIndex];

      const checkboxes = state.players
        .map((targetPlayer, index) => {
          if (index === playerIndex) return '';
          const checked = currentData.targets.includes(index) ? 'checked' : '';
          return `
            <label class="target-checkbox-label">
              <input type="checkbox" id="target-chk-${index}" value="${index}" ${checked}>
              ${targetPlayer.name}
            </label>
          `;
        })
        .join('');

      app.innerHTML = `
        <button class="back-btn" onclick="renderMain()">← بازگشت به لیست</button>
        <h2>تارگت‌های ${player.name} (${state.currentDay})</h2>
        <p class="section-note">چه کسانی را تارگت کرده است؟</p>
        <div class="target-checkbox-container">${checkboxes}</div>
        <label for="player-note">یادداشت</label>
        <textarea id="player-note" placeholder="اگر توضیحی لازم است اینجا بنویس...">${currentData.note || ''}</textarea>
        <button onclick="saveTargets(${playerIndex})">ذخیره اطلاعات</button>
      `;
    }

    function saveTargets(playerIndex) {
      const currentTargets = state.players
        .map((_, index) => index)
        .filter(index => index !== playerIndex)
        .filter(index => document.getElementById(`target-chk-${index}`)?.checked);

      const noteVal = document.getElementById('player-note').value.trim();

      state.data[state.currentDay][playerIndex] = {
        targets: currentTargets,
        note: noteVal
      };

      saveState();
      renderMain();
    }

    function renderAnalysis() {
      app.innerHTML = `
        <button class="back-btn" onclick="renderMain()">← بازگشت به لیست</button>
        <h2>گراف شبکه تارگت‌ها</h2>
        <p class="section-note">در این نما می‌توانی ارتباط بین بازیکنان و تارگت‌های ثبت‌شده در روز جاری را ببینی.</p>
        <svg id="network-svg" viewBox="0 0 600 420"></svg>
        <div id="stats-panel"></div>
      `;
      drawNetwork();
      generateStats();
    }

    function drawNetwork() {
      const svg = document.getElementById('network-svg');
      const width = 600;
      const height = 420;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = 140;

      const positions = state.players.map((player, index) => {
        const angle = (Math.PI * 2 * index) / state.players.length - Math.PI / 2;
        return {
          x: centerX + radius * Math.cos(angle),
          y: centerY + radius * Math.sin(angle),
          player,
          index
        };
      });

      const defs = `
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#999"></polygon>
          </marker>
        </defs>
      `;

      const links = [];
      const todayData = state.data[state.currentDay] || {};

      Object.keys(todayData).forEach(sourceIndex => {
        const source = positions[Number(sourceIndex)];
        const targets = todayData[sourceIndex]?.targets || [];
        targets.forEach(targetIndex => {
          const target = positions[targetIndex];
          if (source && target) {
            links.push(`
              <line class="link" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}"></line>
            `);
          }
        });
      });

      const nodes = positions.map(position => `
        <g>
          <circle class="node ${position.player.isDead ? 'dead-node' : ''}" cx="${position.x}" cy="${position.y}" r="24"></circle>
          <text class="node-text" x="${position.x}" y="${position.y - 4}">${position.index + 1}</text>
          <text class="node-text" x="${position.x}" y="${position.y + 12}">${position.player.name}</text>
        </g>
      `).join('');

      svg.innerHTML = defs + links.join('') + nodes;
    }

    function generateStats() {
      const statsPanel = document.getElementById('stats-panel');
      const counts = new Array(state.players.length).fill(0);
      const todayData = state.data[state.currentDay] || {};

      Object.values(todayData).forEach(entry => {
        (entry.targets || []).forEach(targetIndex => {
          counts[targetIndex] += 1;
        });
      });

      const maxCount = Math.max(...counts, 0);

      if (maxCount === 0) {
        statsPanel.innerHTML = 'هیچ تارگتی برای امروز ثبت نشده است.';
        return;
      }

      const topPlayers = counts
        .map((count, index) => ({ count, name: state.players[index].name }))
        .filter(item => item.count === maxCount);

      statsPanel.innerHTML = `
        <strong>بیشترین متهمین امروز:</strong><br>
        ${topPlayers.map(player => `${player.name} با ${player.count} تارگت`).join('<br>')}
      `;
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `mafia_tracker_data_${state.currentDay}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function resetApp() {
      if (!confirm('آیا مطمئن هستی که می‌خواهی کل بازی ریست شود؟')) {
        return;
      }

      localStorage.removeItem('mafiaTrackerState');
      state = {
        players: [],
        days: ["معارفه", "روز 1", "روز 2", "روز 3", "روز 4", "روز 5"],
        currentDay: "معارفه",
        data: {}
      };
      renderSetup();
    }

    loadState();
    if (state.players.length > 0) {
      renderMain();
    } else {
      renderSetup();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .then(function (registration) {
            console.log('Service Worker registered:', registration.scope);
          })
          .catch(function (error) {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
